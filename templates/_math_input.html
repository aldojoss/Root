<!-- templates/_math_input.html -->
<div class="mb-4">
    <label class="form-label fw-bold">Ingrese la función f(x):</label>
    
    <math-field id="formula" virtual-keyboard-mode="manual" 
                style="font-size: 1.5rem; padding: 10px; border: 1px solid #ced4da; border-radius: 0.375rem; background-color: white; width: 100%;">
    </math-field>
    
    <!-- El input oculto que recibe el LaTeX y viaja a Flask -->
    <input type="hidden" name="ecuacion_latex" id="ecuacion_latex">
    
    <div class="form-text">Haz clic en el cuadro o en el icono del teclado para ingresar la ecuación.</div>
</div>

<!-- SCRIPT INFALIBLE -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const mathField = document.getElementById('formula');
        const hiddenInput = document.getElementById('ecuacion_latex');
        
        // 1. Sincronizar cada vez que presionas una tecla en la pizarra
        mathField.addEventListener('input', function() {
            hiddenInput.value = mathField.value;
        });

        // 2. Seguro de vida: Buscar el formulario padre y sincronizar al dar clic en Calcular
        const formulario = hiddenInput.closest("form");
        if (formulario) {
            formulario.addEventListener("submit", function() {
                hiddenInput.value = mathField.value;
            });
        }
    });
</script>
