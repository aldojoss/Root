<!-- _math_input.html — MathLive input con tema adaptable -->
<div class="mb-3">
  <label class="form-label-nm">Función f(x)</label>

  <math-field id="formula" virtual-keyboard-mode="manual">
    {{ request.form.get('ecuacion_latex', '') }}
  </math-field>

  <input type="hidden" name="ecuacion_latex" id="ecuacion_latex"
         value="{{ request.form.get('ecuacion_latex', '') }}">

  <p style="font-size:0.7rem; color:var(--text-muted); margin-top:6px; margin-bottom:0;">
    <i class="bi bi-keyboard"></i>&nbsp; Usa el teclado virtual o escribe LaTeX directamente
  </p>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const mf     = document.getElementById('formula');
    const hidden = document.getElementById('ecuacion_latex');

    // Sincroniza en cada keystroke dentro de la pizarra
    mf.addEventListener('input', () => { hidden.value = mf.value; });

    // Seguro de vida: sincroniza al hacer submit del formulario padre
    const form = hidden.closest('form');
    if (form) {
      form.addEventListener('submit', () => { hidden.value = mf.value; });
    }
  });
</script>
