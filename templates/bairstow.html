{% extends 'base.html' %}
{% block contenido %}
  <div class="container bg-white p-4 rounded shadow-sm calculadora-numerica-widget mt-3">
    <h2 class="mb-4" style="color: #6610f2;"><i class="bi bi-braces-asterisk"></i> Método de Bairstow</h2>
    <p class="text-muted">Especializado en encontrar todas las raíces de un polinomio, incluyendo raíces complejas, mediante la extracción de factores cuadráticos.</p>
    <form method="POST" class="row g-3 mb-4 align-items-end">
      <!-- 
      <div class="col-md-4">
        <label class="fw-bold">Polinomio P(x)</label>
        <input type="text" name="funcion" class="form-control" required placeholder="x**4 - 3*x**3 + 5" />
      </div>
       -->
      <div class="col-md-2">
        <label>r inicial</label><input type="number" step="any" name="r" class="form-control" required value="0.5" />
      </div>
      <div class="col-md-2">
        <label>s inicial</label><input type="number" step="any" name="s" class="form-control" required value="0.5" />
      </div>
      <div class="col-md-2">
        <label>Tol (%)</label><input type="number" step="any" name="tol" class="form-control" required value="0.001" />
      </div>
      <div class="col-md-2">
        <label>Iteraciones</label><input type="number" name="max_iter" class="form-control" required value="50" />
      </div>
      {% include '_math_input.html' %}
      <div class="col-12 mt-3">
        <button type="submit" class="btn text-white" style="background-color: #6610f2;">Extraer Raíces</button>
      </div>
    </form>
    <hr />
  </div>
  <div class="container mt-3">
    {% include '_resultados.html' %}
  </div>
{% endblock %}
