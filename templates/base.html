<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Métodos Numéricos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <style>
      body {
        background-color: #f8f9fa;
        margin: 0; /* Aseguramos que no haya márgenes extra */
      }
      
      .wrapper {
        display: flex;
        min-height: 100vh; /* Permite que el contenedor crezca con el contenido */
      }
      
      /* Estilos de la barra lateral (AHORA SÍ FUNCIONARÁ EL STICKY) */
      .sidebar {
        width: 340px;
        background-color: #212529;
        color: white;
        padding-top: 20px;
        flex-shrink: 0;
      
        /* === LA MAGIA STICKY === */
        position: sticky;
        top: 0;
        height: 100vh; /* Ocupa exactamente el alto de la pantalla visible */
        overflow-y: auto; /* Solo pone scroll al menú si tienes demasiados métodos */
      }
      
      .sidebar a {
        color: #ced4da;
        text-decoration: none;
        padding: 10px 20px;
        display: block;
        border-radius: 4px;
        margin: 2px 10px;
      }
      .sidebar a:hover {
        background-color: #495057;
        color: white;
      }
      .sidebar .active {
        background-color: #0d6efd;
        color: white;
      }
      
      /* Contenedor principal limpio */
      .content {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
      }
      
      /* Ajuste para submenús */
      .submenu a {
        padding-left: 40px;
        font-size: 0.9em;
      }
      
      /* Efecto de Matriz Gigante para el Inicio */
      .matrix-wrapper {
        position: relative;
        padding: 3rem 4rem;
        margin: auto;
        max-width: 900px;
        text-align: center;
      }
      .matrix-wrapper::before,
      .matrix-wrapper::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        border: 6px solid #212529;
        border-radius: 8px;
      }
      .matrix-wrapper::before {
        left: 0;
        border-right: none;
      }
      .matrix-wrapper::after {
        right: 0;
        border-left: none;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <nav class="sidebar">
        <h4 class="text-center text-white mb-4"><i class="bi bi-calculator"></i> Menú Numérico</h4>

        <a href="/"><i class="bi bi-house-door"></i> Inicio</a>

        <a href="#submenuRaices" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
          <span><i class="bi bi-graph-up"></i> Raíces de Ecuaciones no lineales</span>
          <i class="bi bi-chevron-down small"></i>
        </a>
        <div class="collapse show" id="submenuRaices">
          <div class="submenu">
            <a href="#submenuCerrados" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">Métodos Cerrados <i class="bi bi-chevron-down small"></i></a>
            <div class="collapse show" id="submenuCerrados">
              <a href="/biseccion">- Bisección</a>
              <a href="/falsa_posicion">- Regla falsa</a>
            </div>
          </div>

          <div class="submenu mt-1">
            <a href="#submenuAbiertos" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">Métodos Abiertos <i class="bi bi-chevron-down small"></i></a>
            <div class="collapse show" id="submenuAbiertos">
              <a href="/newton">- Newton-Raphson</a>
              <a href="/secante">- Secante</a>
              <a href="#">- Punto fijo</a>
            </div>
          </div>
        </div>

        <a href="/taylor" class="mt-2"><i class="bi bi-bar-chart-steps"></i> Series de Taylor</a>
      </nav>

      <main class="content">
        {% block contenido %}

        {% endblock %}
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
