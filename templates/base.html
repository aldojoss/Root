<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Métodos Numéricos</title>

    <script defer src="https://unpkg.com/mathlive"></script>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}?v=2" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

    <style>
      body {
        background-color: #f8f9fa;
        margin: 0;
      }
      .wrapper {
        display: flex;
        min-height: 100vh;
      }
      
      /* === Estilos del Menú Lateral === */
      .sidebar {
        width: 340px;
        background-color: #212529;
        color: white;
        padding-top: 20px;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      .sidebar a {
        color: #ced4da;
        text-decoration: none;
        padding: 10px 20px;
        display: block;
        border-radius: 4px;
        margin: 2px 10px;
      }
      .sidebar a:hover {
        background-color: #495057;
        color: white;
      }
      
      .content {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
      }
      .submenu a {
        padding-left: 40px;
        font-size: 0.9em;
      }
      
      /* Efecto de Matriz Gigante para el Inicio */
      .matrix-wrapper {
        position: relative;
        padding: 3rem 4rem;
        margin: auto;
        max-width: 900px;
        text-align: center;
      }
      .matrix-wrapper::before,
      .matrix-wrapper::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        border: 6px solid #212529;
        border-radius: 8px;
      }
      .matrix-wrapper::before {
        left: 0;
        border-right: none;
      }
      .matrix-wrapper::after {
        right: 0;
        border-left: none;
      }
      
      /* === MAGIA RESPONSIVE (MEDIA QUERIES) === */
      @media (max-width: 768px) {
        .wrapper {
          flex-direction: column; /* Apila el menú arriba y el contenido abajo */
        }
        .sidebar {
          width: 100%; /* El menú ocupa todo el ancho */
          height: auto;
          position: relative; /* Quita el sticky en celular para que no estorbe */
          padding-top: 10px;
          padding-bottom: 10px;
        }
        .content {
          padding: 15px; /* Menos espacio a los lados en celular */
        }
      }
      
      /* Obliga a cualquier elemento dentro del panel derecho a quedarse quieto, 
                                       ignorando las clases de Bootstrap como sticky-top */
      .content .sticky-top {
        position: static !important;
        z-index: auto !important;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <nav class="sidebar">
        <div class="d-flex justify-content-between align-items-center px-3 mb-2 d-md-block text-center">
          <h4 class="text-white mb-0 mb-md-4"><i class="bi bi-calculator"></i> Menú Numérico</h4>
          <button class="btn btn-outline-light d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal"><i class="bi bi-list"></i></button>
        </div>

        <div class="collapse d-md-block" id="menuPrincipal">
          <a href="/"><i class="bi bi-house-door"></i> Inicio</a>

          <a href="#submenuRaices" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center mt-2">
            <span><i class="bi bi-graph-up"></i> Raíces de Ecuaciones No Lineales</span>
            <i class="bi bi-chevron-down small"></i>
          </a>
          <div class="collapse show" id="submenuRaices">
            <div class="submenu">
              <a href="#submenuCerrados" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">Métodos Cerrados <i class="bi bi-chevron-down small"></i></a>
              <div class="collapse" id="submenuCerrados">
                <a href="/biseccion">- Bisección</a>
                <a href="/falsa_posicion">- Regla falsa</a>
              </div>
            </div>

            <div class="submenu mt-1">
              <a href="#submenuAbiertos" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">Métodos Abiertos <i class="bi bi-chevron-down small"></i></a>
              <div class="collapse" id="submenuAbiertos">
                <a href="/newton">- Newton-Raphson</a>
                <a href="/secante">- Secante</a>
                <a href="/punto_fijo">- Punto fijo</a>
                <a href="/muller">- Muller</a>
                <a href="/horner_newton">- Horner-Newton</a>
              </div>
            </div>
          </div>

          <a href="/taylor" class="mt-2"><i class="bi bi-bar-chart-steps"></i> Series de Taylor</a>
          <a href="/horner" class="mt-2"><i class="bi bi-layout-three-columns"></i> Método de Horner</a>
          <a href="/bairstow" class="mt-2"><i class="bi bi-braces-asterisk"></i> Método de Bairstow</a>
        </div>
      </nav>

      <main class="content">
        {% block contenido %}

        {% endblock %}
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const mathField = document.getElementById('formula');
        const inputOculto = document.getElementById('ecuacion_latex');
        
        if (mathField && inputOculto) {
            // Sincronización en tiempo real cada vez que el usuario escribe
            mathField.addEventListener('input', (ev) => {
                inputOculto.value = mathField.value;
                console.log("LaTeX actual:", mathField.value); // Para ver en la consola del navegador
            });
        }
    });
</script>

  </body>
</html>
