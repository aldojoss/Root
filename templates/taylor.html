{% extends 'base.html' %}

{% block contenido %}
  <div class="container bg-white p-4 rounded shadow-sm mt-3 sticky-top" style="z-index: 10;">
    <h2 class="mb-4 text-warning"><i class="bi bi-bar-chart-steps"></i> Series de Taylor</h2>
    <p class="text-muted">
      Expande una función f(x) en un polinomio centrado en <strong class="text-dark">x0</strong> para estimar el valor de la función en un punto <strong class="text-dark">x</strong> específico.
    </p>

    <form method="POST" class="row g-3 mb-4 align-items-end">
      <div class="col-md-4">
        <label class="fw-bold">Función f(x)</label>
        <input type="text" name="funcion" class="form-control" required placeholder="exp(x)" />
      </div>
      <div class="col-md-2">
        <label class="fw-bold text-orange">Centro (x0)</label>
        <input type="number" step="any" name="x0" class="form-control" required placeholder="0" title="El punto donde se centrará la serie (usualmente 0 para Maclaurin)" />
      </div>
      <div class="col-md-3">
        <label class="fw-bold text-purple">Punto a evaluar (x)</label>
        <input type="number" step="any" name="x_eval" class="form-control" required placeholder="1" title="El valor donde quieres calcular la aproximación" />
      </div>
      <div class="col-md-3">
        <label class="fw-bold">Orden del Polinomio (n)</label>
        <input type="number" name="orden" class="form-control border-warning shadow-sm" required min="1" max="15" placeholder="5" />
      </div>
      <div class="col-12 mt-4">
        <button type="submit" class="btn btn-warning"><i class="bi bi-calculator"></i> Expandir Serie</button>
      </div>
    </form>

    <hr />
  </div>

  <div class="container mt-3">
    {% include '_resultados.html' %}
  </div>
{% endblock %}
